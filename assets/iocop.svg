<?xml version="1.0" encoding="UTF-8"?>
<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringGrad" x1="6" y1="8" x2="42" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2f7dff"/>
      <stop offset="50%" stop-color="#ff8a00"/>
      <stop offset="100%" stop-color="#7a32ff"/>
    </linearGradient>
    <linearGradient id="shieldBlue" x1="14" y1="16" x2="24" y2="39" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2f8dff"/>
      <stop offset="100%" stop-color="#1235b8"/>
    </linearGradient>
    <linearGradient id="shieldOrange" x1="24" y1="16" x2="34" y2="39" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffb01f"/>
      <stop offset="100%" stop-color="#ff5a00"/>
    </linearGradient>
    <linearGradient id="metal" x1="12" y1="11" x2="36" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="45%" stop-color="#a7b5d8"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="capTop" x1="11" y1="8" x2="37" y2="15" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2c3b7a"/>
      <stop offset="100%" stop-color="#141b44"/>
    </linearGradient>
    <linearGradient id="capBrim" x1="13" y1="14" x2="35" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1433"/>
      <stop offset="50%" stop-color="#2e396f"/>
      <stop offset="100%" stop-color="#0f1433"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- outer ring -->
  <circle cx="24" cy="24" r="21.5" fill="none" stroke="url(#ringGrad)" stroke-width="1.8" opacity="0.95"/>
  <circle cx="24" cy="24" r="18.8" fill="#0f1226" opacity="0.12"/>

  <!-- side circuits -->
  <g opacity="0.9" stroke-linecap="round" stroke-width="1.3" fill="none" filter="url(#softGlow)">
    <g stroke="#2f7dff">
      <path d="M8.5 21h3.6c1.2 0 1.7-1 1.7-1.8V18"/>
      <path d="M9 26h4.8c1.1 0 1.4.7 1.4 1.4v1.6"/>
      <circle cx="8.2" cy="21" r="1.4" fill="#2f7dff" stroke="none"/>
      <circle cx="8.7" cy="26" r="1.2" fill="#2f7dff" stroke="none"/>
      <rect x="14.3" y="16.6" width="1.9" height="1.9" rx="0.35" fill="#2f7dff" stroke="none"/>
    </g>
    <g stroke="#ff8a00">
