  <path d="M24 12.8
           C20.6 14.7 17.4 15.5 14.2 16.2
           V26.2
           C14.2 31.8 18 36.1 24 39.6
           C30 36.1 33.8 31.8 33.8 26.2
           V16.2
           C30.6 15.5 27.4 14.7 24 12.8Z"
