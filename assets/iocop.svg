  <path d="M23 10.8l1-2.1 1 2.1 2.2.3-1.6 1.6.4 2.2-2-1.1-2 1.1.4-2.2-1.6-1.6z"
        fill="#ffffff" opacity="0.95"/>

  <!-- IO glyph -->
  <rect x="18.3" y="20.2" width="2.8" height="10.4" rx="0.4" fill="#ffffff"/>
  <path d="M25.2 21.2 L30.3 25.4 L25.2 29.6"
        fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- tiny highlight -->
  <path d="M16.1 18.3 C18.4 17.8 21.1 16.7 24 15.1" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="0.8" stroke-linecap="round"/>
