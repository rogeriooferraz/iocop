      <path d="M39 26h-4.8c-1.1 0-1.4.7-1.4 1.4v1.6"/>
      <circle cx="39.8" cy="21" r="1.4" fill="#ff8a00" stroke="none"/>
      <circle cx="39.3" cy="26" r="1.2" fill="#ff8a00" stroke="none"/>
      <rect x="31.8" y="16.6" width="1.9" height="1.9" rx="0.35" fill="#ff8a00" stroke="none"/>
    </g>
  </g>

